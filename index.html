<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회지 메이커 · 롤플레이 로그를 소설책으로</title>
  <meta name="description" content="AI 챗 롤플레이 로그를 소설책/회지 형식으로 정리하고 PDF로 저장합니다." />

  <!-- Pretendard (UI/산세리프) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <!-- KoPubWorld 바탕 (출판용 명조) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-kopubworld@1.0/batang.min.css" />
  <!-- 보조 한글 세리프 옵션 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=23" />
</head>
<body>
  <header class="topbar no-print">
    <div class="topbar__brand">
      <span class="topbar__logo">❦</span>
      <span class="topbar__title">회지 메이커</span>
    </div>
    <div class="topbar__actions">
      <label class="toggle toggle--top" title="서식 편집 켜기/끄기">
        <input type="checkbox" id="richToggle" />
        <span class="toggle__track"><span class="toggle__dot"></span></span>
        <span class="toggle__label">서식 편집</span>
      </label>
      <span class="topbar__div"></span>
      <button id="sampleBtn" class="btn btn--ghost" type="button">예시 넣기</button>
      <button id="clearBtn" class="btn btn--ghost" type="button">비우기</button>
      <button id="pdfBtn" class="btn btn--primary" type="button">PDF로 저장</button>
    </div>
  </header>

  <main class="layout">
    <!-- ===== 설정 / 편집 패널 ===== -->
    <section class="panel no-print" aria-label="설정">
      <div class="panel__scroll">
        <h2 class="panel__heading">본문 서식</h2>

        <div class="field field--row">
          <label class="field">
            <span class="field__label">판형</span>
            <select id="pageSize" class="field__input">
              <option value="a5" selected>A5 (책 느낌)</option>
              <option value="a4">A4</option>
              <option value="b6">B6 (문고본)</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">글씨 크기</span>
            <select id="fontSize" class="field__input">
              <option value="small">작게</option>
              <option value="medium" selected>보통</option>
              <option value="large">크게</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span class="field__label">본문 글꼴</span>
          <select id="fontFamily" class="field__input">
            <option value="'KoPubWorld Batang', serif" selected>KoPubWorld 바탕 (출판 명조)</option>
            <option value="'Pretendard Variable', 'Pretendard', sans-serif">Pretendard (산세리프)</option>
            <option value="'Nanum Myeongjo', serif">나눔명조</option>
            <option value="'Noto Serif KR', serif">본명조</option>
          </select>
        </label>

        <div class="field">
          <span class="field__label">지문 표현 방식</span>
          <div class="seg" id="narrationStyle">
            <label class="seg__opt"><input type="radio" name="narr" value="plain" checked /><span>일반 문장</span></label>
            <label class="seg__opt"><input type="radio" name="narr" value="italic" /><span>기울임</span></label>
            <label class="seg__opt"><input type="radio" name="narr" value="muted" /><span>흐리게</span></label>
          </div>
        </div>

        <div class="field field--row">
          <label class="field">
            <span class="field__label">문단 간격</span>
            <select id="paraSpace" class="field__input">
              <option value="none" selected>없음(소설체)</option>
              <option value="sm">좁게</option>
              <option value="md">보통</option>
              <option value="lg">넓게</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">첫 장 위 여백</span>
            <select id="firstGap" class="field__input">
              <option value="none" selected>없음</option>
              <option value="md">보통</option>
              <option value="lg">많이</option>
            </select>
          </label>
        </div>

        <label class="field field--check">
          <input id="indent" type="checkbox" checked />
          <span>문단 첫 줄 들여쓰기</span>
        </label>
        <label class="field field--check">
          <input id="dropcap" type="checkbox" />
          <span>첫 문단 첫 글자 키우기(드롭캡)</span>
        </label>
        <label class="field field--check">
          <input id="autoQuote" type="checkbox" checked />
          <span>따옴표 없는 대사에 자동으로 “ ” 붙이기</span>
        </label>

        <p class="panel__hint" id="simpleHint">
          오른쪽 미리보기 <b>본문 페이지</b>를 클릭해 입력·붙여넣기 하세요.
          <code>*지문*</code> · <code>"대사"</code> 형식은 자동 정리,
          <code>***</code> 줄은 장면 구분입니다.
        </p>

        <h2 class="panel__heading panel__heading--section">책 구성</h2>

        <label class="field field--check"><input id="useTitle" type="checkbox" checked /><span>제목</span></label>
        <div class="matter-detail" id="titleField">
          <input id="bookTitle" class="field__input" type="text" placeholder="예) 비 오는 날의 약속" />
        </div>

        <label class="field field--check"><input id="useAuthor" type="checkbox" /><span>저자</span></label>
        <div class="matter-detail" id="authorField" hidden>
          <input id="bookAuthor" class="field__input" type="text" placeholder="예) written by ___" />
        </div>

        <label class="field field--check"><input id="useSubtitle" type="checkbox" /><span>부제 (약표제지·표지)</span></label>
        <div class="matter-detail" id="subtitleField" hidden>
          <input id="titleSubtitle" class="field__input" type="text" placeholder="예) 제1장 · 비" />
        </div>

        <label class="field field--check"><input id="useMeta" type="checkbox" /><span>아래 줄 (연도·회차 등)</span></label>
        <div class="matter-detail" id="metaField" hidden>
          <input id="titleMeta" class="field__input" type="text" placeholder="예) 2026 · 1부" />
        </div>

        <p class="panel__hint panel__hint--compact">
          표지 → 표제지 → 약표제지 → 서문 → 목차 → <b>본문</b> → 참고 → 간기면
        </p>

        <label class="field field--check"><input id="includeCover" type="checkbox" checked /><span>① 표지</span></label>
        <div class="matter-detail" id="coverDetail">
          <label class="field">
            <span class="field__label">표지 스타일</span>
            <select id="coverStyle" class="field__input">
              <option value="image-full" selected>사진 전면</option>
              <option value="image-band">사진 + 제목 띠</option>
              <option value="text-classic">글만 (클래식)</option>
              <option value="text-modern">글만 (모던)</option>
              <option value="text-night">글만 (다크)</option>
              <option value="html">HTML</option>
            </select>
          </label>
          <div id="coverImageRow">
            <label class="field">
              <span class="field__label">표지 사진</span>
              <input id="coverImage" class="field__input" type="file" accept="image/*" />
            </label>
            <button type="button" class="btn btn--ghost btn--sm" id="clearCoverImage">표지 사진 제거</button>
          </div>
          <label class="field" id="coverHtmlField" hidden>
            <span class="field__label">표지 HTML</span>
            <textarea id="coverHtml" class="field__input code-box" rows="6" spellcheck="false"
              placeholder="&lt;div style='text-align:center;padding-top:35mm'&gt;&lt;h1&gt;제목&lt;/h1&gt;&lt;/div&gt;"></textarea>
          </label>
        </div>

        <label class="field field--check"><input id="includeTitleLeaf" type="checkbox" checked /><span>② 표제지 (제목만)</span></label>
        <div class="matter-detail" id="titleLeafDetail">
          <select id="titleLeafStyle" class="field__input">
            <option value="center" selected>가운데</option>
            <option value="lower">아래쪽</option>
            <option value="minimal">미니멀</option>
            <option value="html">HTML</option>
          </select>
          <label class="field" id="titleLeafHtmlField" hidden>
            <span class="field__label">표제지 HTML</span>
            <textarea id="titleLeafHtml" class="field__input code-box" rows="5" spellcheck="false"></textarea>
          </label>
        </div>

        <label class="field field--check"><input id="includeHalfTitle" type="checkbox" checked /><span>③ 약표제지 (제목+부제+저자)</span></label>
        <div class="matter-detail" id="halfTitleDetail">
          <select id="halfTitleStyle" class="field__input">
            <option value="classic" selected>클래식</option>
            <option value="minimal">미니멀</option>
            <option value="cover">표지형 (큰 제목)</option>
            <option value="ornate">장식</option>
            <option value="literary">문학 (세리프 여백)</option>
            <option value="modern">모던 (산세리프)</option>
            <option value="html">HTML</option>
          </select>
          <label class="field" id="halfTitleHtmlField" hidden>
            <span class="field__label">약표제지 HTML</span>
            <textarea id="halfTitleHtml" class="field__input code-box" rows="6" spellcheck="false"></textarea>
          </label>
        </div>

        <label class="field field--check"><input id="includePreface" type="checkbox" /><span>④ 서문 (머리말·추천사 등)</span></label>
        <div class="matter-detail" id="prefaceField" hidden>
          <select id="prefaceStyle" class="field__input">
            <option value="text" selected>텍스트</option>
            <option value="html">HTML</option>
          </select>
          <input id="prefaceLabel" class="field__input" type="text" value="서문" placeholder="머리말 제목" />
          <textarea id="prefaceText" class="field__input preface-box" rows="5" spellcheck="false"
            placeholder="서문 본문. 빈 줄로 문단 구분."></textarea>
          <label class="field" id="prefaceHtmlField" hidden>
            <span class="field__label">서문 HTML</span>
            <textarea id="prefaceHtml" class="field__input code-box" rows="6" spellcheck="false"></textarea>
          </label>
        </div>

        <label class="field field--check"><input id="includeToc" type="checkbox" /><span>⑤ 목차</span></label>
        <div class="matter-detail" id="tocField" hidden>
          <select id="tocStyle" class="field__input">
            <option value="text" selected>목차 목록</option>
            <option value="html">HTML</option>
          </select>
          <textarea id="tocText" class="field__input preface-box" rows="5" spellcheck="false"
            placeholder="한 줄에 한 항목&#10;제1장  비 오는 날·········· 3"></textarea>
          <button type="button" class="btn btn--ghost btn--sm" id="tocFromBody">본문에서 목차 추출</button>
          <label class="field" id="tocHtmlField" hidden>
            <span class="field__label">목차 HTML</span>
            <textarea id="tocHtml" class="field__input code-box" rows="6" spellcheck="false"></textarea>
          </label>
        </div>

        <h2 class="panel__heading">뒤장</h2>

        <label class="field field--check"><input id="includeEpilogue" type="checkbox" /><span>⑥ 참고·색인·뒷말</span></label>
        <div class="matter-detail" id="epilogueField" hidden>
          <select id="epilogueStyle" class="field__input">
            <option value="text" selected>텍스트</option>
            <option value="html">HTML</option>
          </select>
          <input id="epilogueLabel" class="field__input" type="text" value="참고" placeholder="페이지 제목" />
          <textarea id="epilogueText" class="field__input preface-box" rows="4" spellcheck="false"></textarea>
          <label class="field" id="epilogueHtmlField" hidden>
            <span class="field__label">참고 HTML</span>
            <textarea id="epilogueHtml" class="field__input code-box" rows="6" spellcheck="false"></textarea>
          </label>
        </div>

        <label class="field field--check"><input id="includeColophon" type="checkbox" /><span>⑦ 간기면 (발행·판권)</span></label>
        <div class="matter-detail" id="colophonField" hidden>
          <select id="colophonStyle" class="field__input">
            <option value="center" selected>가운데 (텍스트)</option>
            <option value="bottom">아래 정렬 (텍스트)</option>
            <option value="html">HTML</option>
          </select>
          <textarea id="colophonText" class="field__input preface-box" rows="4" spellcheck="false"
            placeholder="발행일 · 인쇄 · 저작권 등"></textarea>
          <label class="field" id="colophonHtmlField" hidden>
            <span class="field__label">간기면 HTML</span>
            <textarea id="colophonHtml" class="field__input code-box" rows="6" spellcheck="false"></textarea>
          </label>
        </div>

      </div>
    </section>

    <!-- ===== 미리보기 (바로 편집) ===== -->
    <section class="preview" id="preview" aria-label="미리보기">
      <div class="viewbar no-print">
        <div class="viewbar__left">
          <div class="seg seg--view" id="viewMode">
            <label class="seg__opt"><input type="radio" name="view" value="scroll" checked /><span>스크롤·편집</span></label>
            <label class="seg__opt"><input type="radio" name="view" value="flip" /><span>넘기기</span></label>
          </div>
          <div class="seg seg--spread" id="spreadMode" hidden>
            <label class="seg__opt"><input type="radio" name="spread" value="single" checked /><span>단면</span></label>
            <label class="seg__opt"><input type="radio" name="spread" value="spread" /><span>양면</span></label>
          </div>
        </div>
        <div class="viewbar__count" id="pageCount"></div>
      </div>

      <!-- 서식 툴바: '서식 편집' 켜면 나타남 -->
      <div class="rtoolbar no-print" id="rtoolbar" hidden>
        <select class="rtb-sel" data-cmd="fontName" title="글꼴">
          <option value="" selected disabled>글꼴</option>
          <option value="'KoPubWorld Batang', serif">KoPub 바탕</option>
          <option value="'Pretendard Variable','Pretendard',sans-serif">Pretendard</option>
          <option value="'Nanum Myeongjo', serif">나눔명조</option>
          <option value="'Noto Serif KR', serif">본명조</option>
        </select>
        <select class="rtb-sel" data-cmd="fontSize" title="글자 크기">
          <option value="" selected disabled>크기</option>
          <option value="12">12</option>
          <option value="14">14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="24">24</option>
          <option value="28">28</option>
          <option value="32">32</option>
        </select>
        <span class="rtb-sep"></span>
        <button type="button" class="rtb-btn" data-cmd="bold" title="굵게"><b>B</b></button>
        <button type="button" class="rtb-btn" data-cmd="italic" title="기울임"><i>I</i></button>
        <button type="button" class="rtb-btn" data-cmd="underline" title="밑줄"><u>U</u></button>
        <button type="button" class="rtb-btn" data-cmd="strikeThrough" title="취소선"><s>S</s></button>
        <span class="rtb-sep"></span>
        <label class="rtb-color" title="글자색">A<input type="color" data-cmd="foreColor" value="#1a1a1a" /></label>
        <label class="rtb-color" title="형광펜">✎<input type="color" data-cmd="hiliteColor" value="#fff2a8" /></label>
        <span class="rtb-sep"></span>
        <button type="button" class="rtb-btn" data-cmd="justifyLeft" title="왼쪽 정렬">⯇</button>
        <button type="button" class="rtb-btn" data-cmd="justifyCenter" title="가운데 정렬">≡</button>
        <button type="button" class="rtb-btn" data-cmd="justifyRight" title="오른쪽 정렬">⯈</button>
        <span class="rtb-sep"></span>
        <button type="button" class="rtb-btn" data-cmd="removeFormat" title="서식 지우기">Tx</button>
        <span class="rtb-sep"></span>
        <label class="rtb-btn rtb-btn--file" title="이미지 삽입">🖼<input type="file" id="imgInsert" accept="image/*" hidden /></label>
        <button type="button" class="rtb-btn" data-cmd="createLink" title="링크">🔗</button>
        <button type="button" class="rtb-btn" data-cmd="insertHorizontalRule" title="구분선">―</button>
      </div>

      <div class="stage" id="stage">
        <button class="nav nav--prev no-print" id="prevBtn" type="button" aria-label="이전 쪽">‹</button>
        <!-- 편집 원본(화면 밖) — 붙여넣기·서식용 -->
        <div id="docSource" class="doc-source" aria-hidden="true">
          <div id="richDoc" class="body" contenteditable="true" spellcheck="false"></div>
        </div>
        <!-- 스크롤/넘기기 동일한 페이지 분할 미리보기 -->
        <div id="book" class="book size-a5"></div>
        <button class="nav nav--next no-print" id="nextBtn" type="button" aria-label="다음 쪽">›</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=23"></script>
</body>
</html>
