<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회지 메이커 · 롤플레이 로그를 소설책으로</title>
  <meta name="description" content="AI 챗 롤플레이 로그를 소설책/회지 형식으로 정리하고 PDF로 저장합니다." />

  <!-- Pretendard (UI/산세리프) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <!-- KoPubWorld 바탕 (출판용 명조) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-kopubworld@1.0/batang.min.css" />
  <!-- 보조 한글 세리프 옵션 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar no-print">
    <div class="topbar__brand">
      <span class="topbar__logo">❦</span>
      <span class="topbar__title">회지 메이커</span>
    </div>
    <div class="topbar__actions">
      <button id="sampleBtn" class="btn btn--ghost" type="button">예시 넣기</button>
      <button id="clearBtn" class="btn btn--ghost" type="button">비우기</button>
      <button id="pdfBtn" class="btn btn--primary" type="button">PDF로 저장</button>
    </div>
  </header>

  <main class="layout">
    <!-- ===== 설정 / 편집 패널 ===== -->
    <section class="panel no-print" aria-label="설정">
      <div class="panel__scroll">
        <h2 class="panel__heading">책 정보</h2>

        <label class="field">
          <span class="field__label">제목</span>
          <input id="bookTitle" class="field__input" type="text" placeholder="예) 비 오는 날의 약속" />
        </label>
        <label class="field">
          <span class="field__label">부제 / 저자 (선택)</span>
          <input id="bookAuthor" class="field__input" type="text" placeholder="예) written by ___" />
        </label>

        <div class="field field--row">
          <label class="field">
            <span class="field__label">판형</span>
            <select id="pageSize" class="field__input">
              <option value="a5" selected>A5 (책 느낌)</option>
              <option value="a4">A4</option>
              <option value="b6">B6 (문고본)</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">글씨 크기</span>
            <select id="fontSize" class="field__input">
              <option value="small">작게</option>
              <option value="medium" selected>보통</option>
              <option value="large">크게</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span class="field__label">본문 글꼴</span>
          <select id="fontFamily" class="field__input">
            <option value="'KoPubWorld Batang', serif" selected>KoPubWorld 바탕 (출판 명조)</option>
            <option value="'Pretendard Variable', 'Pretendard', sans-serif">Pretendard (산세리프)</option>
            <option value="'Nanum Myeongjo', serif">나눔명조</option>
            <option value="'Noto Serif KR', serif">본명조</option>
          </select>
        </label>

        <div class="field">
          <span class="field__label">지문 표현 방식</span>
          <div class="seg" id="narrationStyle">
            <label class="seg__opt"><input type="radio" name="narr" value="plain" checked /><span>일반 문장</span></label>
            <label class="seg__opt"><input type="radio" name="narr" value="italic" /><span>기울임</span></label>
            <label class="seg__opt"><input type="radio" name="narr" value="muted" /><span>흐리게</span></label>
          </div>
        </div>

        <div class="field field--row">
          <label class="field">
            <span class="field__label">문단 간격</span>
            <select id="paraSpace" class="field__input">
              <option value="none" selected>없음(소설체)</option>
              <option value="sm">좁게</option>
              <option value="md">보통</option>
              <option value="lg">넓게</option>
            </select>
          </label>
          <label class="field">
            <span class="field__label">첫 장 위 여백</span>
            <select id="firstGap" class="field__input">
              <option value="none" selected>없음</option>
              <option value="md">보통</option>
              <option value="lg">많이</option>
            </select>
          </label>
        </div>

        <label class="field field--check">
          <input id="indent" type="checkbox" checked />
          <span>문단 첫 줄 들여쓰기</span>
        </label>
        <label class="field field--check">
          <input id="dropcap" type="checkbox" />
          <span>첫 문단 첫 글자 키우기(드롭캡)</span>
        </label>
        <label class="field field--check">
          <input id="autoQuote" type="checkbox" checked />
          <span>따옴표 없는 대사에 자동으로 “ ” 붙이기</span>
        </label>

        <div class="logedit-bar">
          <h2 class="panel__heading panel__heading--inline">로그 편집</h2>
          <label class="toggle" title="서식 편집 켜기/끄기">
            <input type="checkbox" id="richToggle" />
            <span class="toggle__track"><span class="toggle__dot"></span></span>
            <span class="toggle__label">서식</span>
          </label>
        </div>

        <p class="panel__hint" id="simpleHint">
          <code>*지문*</code> · <code>"대사"</code> · 그냥 적은 줄 = 대사.
          장면 구분은 <code>***</code> 한 줄.
        </p>
        <div class="logtools" id="logtools">
          <button type="button" class="chip" data-act="narr">＊ 지문</button>
          <button type="button" class="chip" data-act="dia">“ 대사</button>
          <button type="button" class="chip" data-act="scene">⸻ 장면 구분</button>
        </div>
        <textarea id="logInput" class="logbox" spellcheck="false"
          placeholder="여기에 롤플레이 로그를 붙여넣으세요...&#10;&#10;*그는 천천히 문을 열었다.&#10;빗물이 어깨를 적셨다.*&#10;&quot;늦어서 미안.&quot;&#10;정말 기다렸어."></textarea>

        <div class="rich-pane" id="richPane" hidden>
          <div class="rtoolbar" id="rtoolbar">
            <button type="button" class="rtb-btn rtb-btn--ghost" data-cmd="seed" title="위 텍스트 불러오기">↻</button>
            <select class="rtb-sel" data-cmd="fontName" title="글꼴">
              <option value="" selected disabled>글꼴</option>
              <option value="'KoPubWorld Batang', serif">KoPub 바탕</option>
              <option value="'Pretendard Variable','Pretendard',sans-serif">Pretendard</option>
              <option value="'Nanum Myeongjo', serif">나눔명조</option>
              <option value="'Noto Serif KR', serif">본명조</option>
            </select>
            <select class="rtb-sel" data-cmd="fontSize" title="글자 크기">
              <option value="" selected disabled>크기</option>
              <option value="12">12</option>
              <option value="14">14</option>
              <option value="16">16</option>
              <option value="18">18</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="28">28</option>
              <option value="32">32</option>
            </select>
            <span class="rtb-sep"></span>
            <button type="button" class="rtb-btn" data-cmd="bold" title="굵게"><b>B</b></button>
            <button type="button" class="rtb-btn" data-cmd="italic" title="기울임"><i>I</i></button>
            <button type="button" class="rtb-btn" data-cmd="underline" title="밑줄"><u>U</u></button>
            <button type="button" class="rtb-btn" data-cmd="strikeThrough" title="취소선"><s>S</s></button>
            <span class="rtb-sep"></span>
            <label class="rtb-color" title="글자색">A<input type="color" data-cmd="foreColor" value="#1a1a1a" /></label>
            <label class="rtb-color" title="형광펜">✎<input type="color" data-cmd="hiliteColor" value="#fff2a8" /></label>
            <span class="rtb-sep"></span>
            <button type="button" class="rtb-btn" data-cmd="justifyLeft" title="왼쪽 정렬">⯇</button>
            <button type="button" class="rtb-btn" data-cmd="justifyCenter" title="가운데 정렬">≡</button>
            <button type="button" class="rtb-btn" data-cmd="justifyRight" title="오른쪽 정렬">⯈</button>
            <span class="rtb-sep"></span>
            <button type="button" class="rtb-btn" data-cmd="removeFormat" title="서식 지우기">Tx</button>
          </div>
          <div class="rich" id="richDoc" contenteditable="true" spellcheck="false"></div>
        </div>
      </div>
    </section>

    <!-- ===== 미리보기 ===== -->
    <section class="preview" id="preview" aria-label="미리보기">
      <div class="viewbar no-print">
        <div class="viewbar__left">
          <div class="seg seg--view" id="viewMode">
            <label class="seg__opt"><input type="radio" name="view" value="scroll" checked /><span>스크롤</span></label>
            <label class="seg__opt"><input type="radio" name="view" value="flip" /><span>넘기기</span></label>
          </div>
          <div class="seg seg--spread" id="spreadMode" hidden>
            <label class="seg__opt"><input type="radio" name="spread" value="single" checked /><span>단면</span></label>
            <label class="seg__opt"><input type="radio" name="spread" value="spread" /><span>양면</span></label>
          </div>
        </div>
        <div class="viewbar__count" id="pageCount"></div>
      </div>

      <div class="stage" id="stage">
        <button class="nav nav--prev no-print" id="prevBtn" type="button" aria-label="이전 쪽">‹</button>
        <div id="book" class="book size-a5"></div>
        <button class="nav nav--next no-print" id="nextBtn" type="button" aria-label="다음 쪽">›</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
